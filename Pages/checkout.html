    <h1 id="checkout-heading">Checkout</h1>
    <section id="checkout-split">
        <form class="payment-form">
            <fieldset id="customer-info">
                <legend>Delivery Info</legend>
                <label for="first-name">Name:</label>
                <div class="payment-container" id="payment-name">
                <input type="text" class="payment-text two-split" id="first-name" placeholder="First Name">
                <input type="text" class="payment-text two-split" id="last-name" placeholder="Last Name">
                </div>
                <label for="address" >Address:</label>
                <input type="text" class="payment-text" id="address" placeholder="123 Example St">
                <label for="country" >Country:</label>
                <input type="text" class="payment-text" id="country">
                <label for="city" >City:</label>
                <input type="text" class="payment-text" id="city">
                <label for="province" >Province:</label>
                <input type="text" class="payment-text" id="province">
                <label for="postal-code" >Postal Code:</label>
                <input type="text" class="payment-text" id="postal-code">
                <label for="email" >Email:</label>
                <input type="text" class="payment-text" id="email" placeholder="example@email.com">

            </fieldset>

            <fieldset id="shipping-options">
                <legend>Shipping Options</legend>
                <input type="radio" id="standard" name="shipping" value="standard">
                <label for="standard">Standard Shipping</label>

                <input type="radio" id="express" name="shipping" value="express">
                <label for="express">Express Shipping</label>
            </fieldset>
            <div id="submit-reset-container">
                <button id="submit-button" type="submit">Submit</button>
                <button id="reset-button" type="reset">Reset</button>
            </div>
        </form>
        <div id="checkout-cart">
          <div class="cart-item">
            <div class="cart-item-desc">
              <img class="cart-item-image" src="https://gameinformer.com/sites/default/files/styles/max_325x325/public/2025/03/24/c7934679/362.jpg.webp" alt="Game Informer magazine issue 362 featuring Final Fantasy VII Rebirth">
              <p class="cart-item-name">Game Informer: Issue 362 <i class="cart-item-quantity">(1)</i></p>
            </div>
            <p class="cart-item-price">$13.99</p>
          </div>
          <div class="cart-item">
            <div class="cart-item-desc">
              <img class="cart-item-image" src="https://gameinformer.com/sites/default/files/styles/max_325x325/public/2025-03/366.jpg.webp" alt="Game Informer magazine issue 366 featuring Hades II">
              <p class="cart-item-name">Game Informer: Issue 366 <i class="cart-item-quantity">(1)</i></p>
            </div>
            <p class="cart-item-price">$13.99</p>
          </div>
          <div id="cart-total-container">
            <p id="cart-subtotal">Subtotal: CAD $27.98</p>
            <p id="cart-shipping">Shipping fee: CAD $10.00</p>
            <p id="cart-total"><strong>Order Total: CAD $37.98</strong></p>
          </div>
        </div>
    </section>
</body>
